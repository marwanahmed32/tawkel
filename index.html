<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0e1f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="هوقل"/>
<link rel="manifest" href="manifest.json"/>
<title>هوقل — سوّق لمكتبك وأدر قضاياك في مكان واحد</title>
<style>
:root {
  --gold:#c9a84c;--gold-l:#e8c97a;--gold-d:#8a6e2f;--gold-bg:rgba(201,168,76,0.08);--gold-br:rgba(201,168,76,0.22);
  --bg:#0a0e1f;--bg2:#111830;--bg3:#16204a;--bg4:#1c2a58;--bg5:#243568;
  --text:#f0f0f0;--tm:#8b93b0;--td:#4d5a80;
  --br:#233158;--br2:#2c3d6c;
  --ok:#2ecc71;--ok-bg:rgba(46,204,113,0.1);--ok-br:rgba(46,204,113,0.25);
  --warn:#f39c12;--warn-bg:rgba(243,156,18,0.1);--warn-br:rgba(243,156,18,0.25);
  --err:#e74c3c;--err-bg:rgba(231,76,60,0.1);--err-br:rgba(231,76,60,0.25);
  --blue:#3498db;--blue-bg:rgba(52,152,219,0.1);
  --r:14px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ONBOARD */
.onboard{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.ob-logo{width:70px;height:70px;border-radius:50%;background:var(--gold-bg);border:2px solid var(--gold-br);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.ob-logo svg{width:36px;height:36px;fill:var(--gold)}
.ob-title{font-size:22px;font-weight:800;color:var(--gold);margin-bottom:6px;text-align:center}
.ob-sub{font-size:14px;color:var(--tm);text-align:center;margin-bottom:32px;line-height:1.6}
.ob-form{width:100%;max-width:340px}
.ob-inp{width:100%;padding:14px;border:1px solid var(--br2);border-radius:12px;background:var(--bg3);color:var(--text);font-size:16px;font-family:inherit;direction:rtl;margin-bottom:12px}
.ob-inp:focus{outline:none;border-color:var(--gold)}
.ob-btn{width:100%;padding:15px;background:var(--gold);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--gold-br);padding:12px 14px;padding-top:calc(12px + var(--st));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-top{display:contents}
.hdr-left{display:flex;flex-direction:column;gap:1px}
.hdr-welcome{font-size:11px;color:var(--gold-d);letter-spacing:.5px}
.hdr-name{font-size:16px;font-weight:800;color:var(--gold)}
.hdr-icons{display:flex;gap:8px;align-items:center}
.hdr-icon{width:36px;height:36px;border-radius:50%;border:1px solid var(--gold-br);background:var(--gold-bg);display:flex;align-items:center;justify-content:center;cursor:pointer}
.hdr-icon svg{width:18px;height:18px;fill:var(--gold)}

/* NAV */
.nav{display:flex;background:var(--bg2);border-top:1px solid var(--br);padding-bottom:var(--sb);flex-shrink:0}
.nb{flex:1;padding:9px 2px 7px;background:none;border:none;color:var(--td);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;border-top:2px solid transparent;transition:color .2s}
.nb svg{width:21px;height:21px}
.nb.active{color:var(--gold);border-top-color:var(--gold)}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;background:var(--bg)}

/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.st{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:13px 11px}
.stv{font-size:24px;font-weight:800}
.stl{font-size:11px;color:var(--tm);margin-top:2px}
.cg .stv{color:var(--gold)}.cs .stv{color:var(--ok)}.cw .stv{color:var(--warn)}.ce .stv{color:var(--err)}

/* BADGES */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.ba{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-br)}
.bp{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-br)}
.bc{background:rgba(255,255,255,.05);color:var(--tm);border:1px solid var(--br)}
.bn{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-br)}

/* CASE CARD */
.cc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:13px;margin-bottom:9px;border-right:3px solid var(--br2);cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.cc:active{opacity:.8}
.cc.active{border-right-color:var(--ok)}.cc.pending{border-right-color:var(--warn)}.cc.closed{border-right-color:var(--td)}.cc.new{border-right-color:var(--gold)}

.cc-body{flex:1;min-width:0}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px}
.cc-name{font-size:14px;font-weight:700;flex:1;line-height:1.3;color:var(--text)}
.cc-meta{font-size:12px;color:var(--tm);margin-bottom:7px;display:flex;flex-wrap:wrap;gap:8px}
.cc-bot{display:flex;justify-content:space-between;align-items:center}
.cc-fee{font-size:14px;font-weight:700;color:var(--gold)}
.cc-sess{font-size:12px;color:var(--td)}

/* SESSION CARD */
.sc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:12px 13px;margin-bottom:9px;display:flex;gap:11px;align-items:center}
.sd{background:var(--gold-bg);border:1px solid var(--gold-br);border-radius:10px;padding:7px 9px;text-align:center;min-width:50px;flex-shrink:0}
.sdd{font-size:20px;font-weight:800;line-height:1;color:var(--gold)}
.sdm{font-size:10px;font-weight:600;color:var(--gold-d)}
.si{flex:1;min-width:0}
.sn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.sd2{font-size:12px;color:var(--tm);margin-top:2px}
.st2{font-size:12px;color:var(--gold);margin-top:3px;font-weight:600}
.sms-n{font-size:11px;color:var(--warn);margin-top:3px}

/* ALERT */
.abn{background:var(--warn-bg);border:1px solid var(--warn-br);border-radius:var(--r);padding:12px 13px;margin-bottom:11px;display:flex;gap:9px;align-items:center}
.abt{font-size:13px;font-weight:700;color:var(--warn)}
.abs{font-size:12px;color:var(--warn);opacity:.8}

/* OVERDUE */
.obn{background:var(--err-bg);border:1px solid var(--err-br);border-radius:var(--r);padding:12px 13px;margin-bottom:11px;display:flex;gap:9px;align-items:center}
.obt{font-size:13px;font-weight:700;color:var(--err)}

/* SEC TITLE */
.sct{font-size:11px;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px}

/* FINANCE */
.fr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--br);font-size:14px}
.fr:last-child{border-bottom:none}
.fl{color:var(--tm)}
.fp{color:var(--ok);font-weight:700}.fd{color:var(--err);font-weight:700}.ft{color:var(--gold);font-weight:700}
.pb{background:var(--bg4);border-radius:4px;height:5px;margin-top:9px;overflow:hidden}
.pf{height:100%;border-radius:4px;background:var(--gold);transition:width .3s}
.pf.done{background:var(--ok)}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:13px;margin-bottom:9px}
.ct{font-size:14px;font-weight:700;margin-bottom:9px;color:var(--text)}

/* FAB */
.fab{position:fixed;bottom:calc(78px + var(--sb));left:50%;transform:translateX(-50%);background:var(--gold);color:#000;border:none;border-radius:50px;padding:13px 24px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.35);display:flex;align-items:center;gap:7px;z-index:50;white-space:nowrap}
.fab svg{width:19px;height:19px;fill:#000}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--bg2);border-radius:22px 22px 0 0;border-top:1px solid var(--gold-br);padding:18px 15px calc(22px + var(--sb));width:100%;max-height:93vh;overflow-y:auto}
.mh{width:34px;height:4px;background:var(--br2);border-radius:2px;margin:0 auto 16px}
.modal h2{font-size:17px;font-weight:800;margin-bottom:16px;color:var(--text)}
.fg{margin-bottom:13px}
.fg label{font-size:11px;color:var(--tm);display:block;margin-bottom:6px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 13px;border:1px solid var(--br2);border-radius:10px;background:var(--bg3);color:var(--text);font-size:15px;font-family:inherit;direction:rtl;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gold)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.br{display:flex;gap:9px;margin-top:16px}
.bsave{flex:2;background:var(--gold);color:#000;border:none;padding:13px;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.bcan{flex:1;background:var(--bg3);color:var(--tm);border:1px solid var(--br);padding:13px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.bpay{width:100%;background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-br);padding:11px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:9px;font-family:inherit}
.bdel{background:var(--err-bg);color:var(--err);border:1px solid var(--err-br)}
.sbox{background:var(--gold-bg);border:1px solid var(--gold-br);border-radius:var(--r);padding:11px 13px;margin-bottom:12px;display:flex;gap:9px;align-items:center}
.sbox svg{width:19px;height:19px;fill:var(--gold);flex-shrink:0}
.sbt{font-size:13px;font-weight:700;color:var(--gold)}
.sbs{font-size:12px;color:var(--gold-d);margin-top:2px}

.empty{text-align:center;padding:48px 20px;color:var(--td)}
.empty svg{width:46px;height:46px;fill:var(--br2);display:block;margin:0 auto 13px}
.empty p{font-size:15px;font-weight:600;color:var(--tm)}
.empty small{font-size:13px;display:block;margin-top:5px}
.spacer{height:88px}
option{background:#1a1a1a}

/* DASHBOARD */
.dash-row{display:flex;gap:9px;margin-bottom:9px}
.dash-row .st{flex:1}
.chart-bar-wrap{margin-bottom:12px}
.bar-lbl{font-size:12px;color:var(--tm);margin-bottom:4px;display:flex;justify-content:space-between}
.bar-track{background:var(--bg4);border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--gold);transition:width .4s}
.ai-box{background:var(--bg3);border:1px solid var(--gold-br);border-radius:var(--r);padding:14px;margin-bottom:12px}
.ai-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ai-content{font-size:13px;color:var(--tm);line-height:1.7;white-space:pre-wrap}
.ai-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#000;border:none;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.ai-btn svg{width:18px;height:18px;fill:#000}
.ai-loading{color:var(--gold);font-size:13px;text-align:center;padding:14px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.week-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--br);font-size:13px}
.week-item:last-child{border-bottom:none}

/* NOTIF PANEL */
.notif-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--err);border-radius:50%;display:none}
.notif-dot.show{display:block}

/* edit icon */
.edit-btn{background:none;border:none;color:var(--gold-d);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:inherit;font-weight:600}
.edit-btn:hover{color:var(--gold)}

/* AI CHAT (legal assistant) */
.chat-wrap{display:flex;flex-direction:column;height:60vh}
.chat-msgs{flex:1;overflow-y:auto;padding:4px 2px;margin-bottom:10px}
.chat-msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.7;margin-bottom:9px;white-space:pre-wrap}
.chat-msg.user{background:var(--gold-bg);border:1px solid var(--gold-br);color:var(--gold);margin-right:auto;margin-left:0}
.chat-msg.ai{background:var(--bg3);border:1px solid var(--br);color:var(--text);margin-left:auto;margin-right:0}
.chat-suggests{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip-btn{background:var(--gold-bg);border:1px solid var(--gold-br);color:var(--gold);font-size:11px;padding:6px 11px;border-radius:20px;cursor:pointer;font-family:inherit}
.chat-input-row{display:flex;gap:8px}
.chat-input-row textarea{flex:1;resize:none;padding:11px 13px;border:1px solid var(--br2);border-radius:12px;background:var(--bg3);color:var(--text);font-family:inherit;font-size:14px;direction:rtl}
.chat-send{background:var(--gold);color:#000;border:none;border-radius:12px;padding:0 18px;font-weight:800;cursor:pointer;font-family:inherit}

/* WhatsApp button */
.wa-btn{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.35);color:#25d366;font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;display:inline-flex;align-items:center;gap:4px}

/* CHECKLIST */
.task-item{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--br);font-size:13px}
.task-item:last-child{border-bottom:none}
.task-item.done .task-text{color:var(--td);text-decoration:line-through}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--gold-br);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:13px}
.task-check.checked{background:var(--gold);color:#000;border-color:var(--gold)}
.task-text{flex:1}
.task-due{font-size:11px;color:var(--warn)}

/* CRM LOG */
.log-item{padding:9px 0;border-bottom:1px solid var(--br);font-size:12px}
.log-item:last-child{border-bottom:none}
.log-type{color:var(--gold);font-weight:700;font-size:11px}
.log-date{color:var(--td);font-size:10px;float:left}

/* WELCOME BANNER */
.welcome-banner{padding:16px 4px 8px;margin-bottom:4px}
.welcome-top{font-size:22px;font-weight:800;color:var(--text);line-height:1.3}
.welcome-name{color:var(--gold)}
.welcome-sub{font-size:13px;color:var(--tm);margin-top:4px}

/* HOME QUICK ACTIONS */
.mk-hero{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,var(--gold-d),var(--gold));border-radius:18px;padding:22px 18px;margin-bottom:12px;cursor:pointer;box-shadow:0 8px 28px rgba(201,168,76,.32)}
.mk-hero-icon{font-size:36px;flex-shrink:0}
.mk-hero-body{flex:1;min-width:0}
.mk-hero-title{font-size:19px;font-weight:800;color:#000;line-height:1.3}
.mk-hero-sub{font-size:12px;color:rgba(0,0,0,.68);margin-top:4px;line-height:1.5}
.mk-hero-arrow{font-size:22px;color:#000;flex-shrink:0;font-weight:800}
.qa-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.qa-btn{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;color:var(--tm);position:relative;overflow:hidden}
.qa-btn svg{width:22px;height:22px}
/* أزرار الاختصارات المميزة */
.qa-gold{background:linear-gradient(145deg,#1a1400,#2a1f00);border:2px solid var(--gold);color:var(--gold)}
.qa-gold svg{fill:var(--gold)}
.qa-silver{background:linear-gradient(145deg,#111820,#1a2535);border:2px solid #b0bec5;color:#b0bec5}
.qa-silver svg{fill:#b0bec5}
.qa-bronze{background:linear-gradient(145deg,#150d05,#241508);border:2px solid #cd7f32;color:#cd7f32}
.qa-bronze svg{fill:#cd7f32}
/* همبرجر منيو */
.hamburger{width:36px;height:36px;border-radius:50%;border:1px solid var(--gold-br);background:var(--gold-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.hamburger svg{width:18px;height:18px;fill:var(--gold)}
.hmenu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
.hmenu{position:fixed;top:0;left:0;bottom:0;width:72%;max-width:280px;background:var(--bg2);z-index:151;border-left:1px solid var(--gold-br);padding:20px 0;overflow-y:auto;transform:translateX(-100%);transition:transform .3s ease}
.hmenu.open{transform:translateX(0)}
.hmenu-header{padding:16px 20px 20px;border-bottom:1px solid var(--br)}
.hmenu-name{font-size:16px;font-weight:800;color:var(--gold)}
.hmenu-sub{font-size:11px;color:var(--tm);margin-top:3px}
.hmenu-item{display:flex;align-items:center;gap:13px;padding:14px 20px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;border-bottom:1px solid var(--br)}
.hmenu-item:active{background:var(--bg3)}
.hmenu-item svg{width:20px;height:20px;fill:var(--gold);flex-shrink:0}

/* PLANS */
.plan-card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:20px 16px;margin-bottom:14px;position:relative}
.plan-card.current{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-br)}
.plan-card.featured{border-color:var(--gold-br);background:linear-gradient(160deg,var(--bg2),var(--bg4))}
.plan-badge{position:absolute;top:-10px;right:16px;background:var(--gold);color:#000;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px}
.plan-name{font-size:16px;font-weight:800;color:var(--gold);margin-bottom:4px}
.plan-price{font-size:32px;font-weight:800;color:var(--text);margin-bottom:2px}
.plan-price span{font-size:13px;color:var(--tm);font-weight:600}
.plan-feature{display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--tm);margin:10px 0;line-height:1.6}
.plan-feature svg{width:16px;height:16px;fill:var(--ok);flex-shrink:0;margin-top:2px}
.plan-btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:10px;border:none}
.usage-bar-wrap{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:14px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="hdr-left">
      <div class="hdr-welcome" id="hdr-welcome">مرحباً، مستشار</div>
      <div class="hdr-name" id="hdr-name">هوقل</div>
    </div>
    <button class="hamburger" onclick="openHamburger()">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
  </div>
  <div class="hmenu-overlay" id="hm-overlay" style="display:none" onclick="closeHamburger()"></div>
  <div class="hmenu" id="hm-panel">
    <div class="hmenu-header">
      <div class="hmenu-name" id="hm-name">هوقل</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────
const PHONE_ME = "01026024266";
// أي رقم يطابق ده (بأي صيغة: بمقدمة الدولة أو من غيرها) يعتبر حساب المالك — بلا حدود ولا باقات
function normalizePhoneDigits(p) {
  return (p || '').replace(/\D/g,'').replace(/^20/, '').replace(/^0/, '');
}
function isAdminAccount() {
  if (!PHONE_ME || !store.profile?.phone) return false;
  return normalizePhoneDigits(store.profile.phone) === normalizePhoneDigits(PHONE_ME);
}
// ─── بيانات التحصيل اليدوي (اشتراكات هوقل) ────────────────
// رقمك انت (صاحب المشروع) — عبّيه بالشكل الدولي بدون + أو 00 (مثال: 201012345678)
const ADMIN_WHATSAPP = "201066400606";
// رقم الاستقبال (Instapay أو فودافون كاش) — النص اللي هيظهر للعميل
const ADMIN_PAYMENT_INFO = "فودافون كاش / انستاباي: 01066400606";
const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

// ─── TEAM MODE (Supabase) ─────────────────────────────────
const SUPABASE_URL = "";

let sb = null;
let currentOfficeId = null;
let currentUserRole = null;

// ─── قاعدة بيانات المشتركين (Google Sheets) ────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwF0k6S6txLHC4YqNbLTbIni-pHKA_zTmGbPpggxKC0eCzZcRzljYQ9q2STYMXP7ADG/exec";

function initSubscriberDb() {}

// ═══════════════════════════════════════════════════════════
// طبقة الاتصال الجديدة — بديل كامل لـ fetch() اللي بيتحجب على شبكات/
// متصفحات موبايل كتيرة. القراءة عبر JSONP، والكتابة عبر فورم مخفي
// جوه iframe + الرد بيوصل بـ postMessage. الطريقتين مش عرضة لمشاكل CORS.
// ═══════════════════════════════════════════════════════════

// قراءة (GET) عبر JSONP
function jsonpGet(params, timeoutMs = 15000) {
  return new Promise((resolve, reject) => {
    const cbName = 'qd_jsonp_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('jsonp timeout')); }, timeoutMs);
    function cleanup() { delete window[cbName]; script.remove(); clearTimeout(timer); }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    const qs = new URLSearchParams({ ...params, callback: cbName }).toString();
    script.src = `${APPS_SCRIPT_URL}?${qs}`;
    script.onerror = () => { cleanup(); reject(new Error('jsonp script error')); };
    document.body.appendChild(script);
  });
}

// كتابة (POST) عبر فورم مخفي جوه iframe + استقبال الرد بـ postMessage
function postForm(payload, timeoutMs = 20000) {
  return new Promise((resolve) => {
    const reqId = 'qd_req_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    const iframeName = 'qd_frame_' + reqId;
    const iframe = document.createElement('iframe');
    iframe.name = iframeName;
    iframe.style.display = 'none';

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = APPS_SCRIPT_URL;
    form.target = iframeName;
    form.style.display = 'none';
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.value = JSON.stringify({ ...payload, __reqId: reqId });
    form.appendChild(input);

    let done = false;
    const timer = setTimeout(() => { if (!done) { done = true; cleanup(); resolve({ ok:false, reason:'timeout' }); } }, timeoutMs);

    function onMsg(ev) {
      let data;
      try { data = typeof ev.data === 'string' ? JSON.parse(ev.data) : ev.data; } catch(e) { return; }
      if (!data || data.__reqId !== reqId) return;
      if (done) return;
      done = true;
      cleanup();
      resolve({ ok:true, data });
    }
    function cleanup() {
      window.removeEventListener('message', onMsg);
      clearTimeout(timer);
      setTimeout(() => { form.remove(); iframe.remove(); }, 300);
    }
    window.addEventListener('message', onMsg);

    document.body.appendChild(iframe);
    document.body.appendChild(form);
    form.submit();
  });
}

// يتسجل في الشيت مرة واحدة بس عند أول تسجيل
async function registerSubscriber() {
  if (!store.profile?.phone || !store.profile?.name) return;
  if (store.profile._registered) return; // سجّل قبل كده
  const result = await postForm({ action:'register', phone: store.profile.phone, name: store.profile.name });

  if (result.ok && result.data.success) {
    store.profile._registered = true;
    save();
    return;
  }

  // نتأكد عبر JSONP (قناة تانية مختلفة تمامًا) قبل ما نعتبرها فشلت فعلاً
  try {
    const check = await jsonpGet({ phone: store.profile.phone, t: Date.now() });
    if (!check.notFound) {
      store.profile._registered = true;
      save();
      return;
    }
  } catch(e) { /* حتى JSONP فشل — مشكلة اتصال حقيقية بالإنترنت */ }

  console.error('❌ فشل تسجيل البيانات:', result);
  alert('⚠️ تعذر تسجيل بياناتك في قاعدة البيانات. تأكد من اتصال الإنترنت وحاول تفتح التطبيق تاني بعد شوية.');
}

// يبعت بيانات البروفايل المحدّثة للشيت (بيتنفذ كل ما المستشار يحفظ بياناته)
async function pushProfileToSheet() {
  if (!store.profile?.phone || !store.profile?.name) return;
  const result = await postForm({
    action: 'updateProfile',
    phone: store.profile.phone,
    name: store.profile.name,
    specialty: store.profile.specialty || '',
    websiteUrl: store.profile.websiteUrl || ''
  });
  if (!result.ok) console.warn('⚠️ profile push may have failed:', result);
}

// يبعت بيانات القضايا (ملخص) للشيت — لجدول القضايا المنفصل
let casesSyncTimer = null;
function syncCasesToSheet() {
  clearTimeout(casesSyncTimer);
  casesSyncTimer = setTimeout(async () => {
    if (!store.profile?.phone) return;
    const summary = store.cases.map(c => ({
      id: c.id,
      name: c.name,
      client: c.client,
      opponent: c.opponent || '',
      type: c.type,
      status: c.status,
      court: c.court || '',
      caseNum: c.caseNum || '',
      totalFee: c.totalFee || 0,
      paid: c.paid || 0,
      attachments: (c.attachments || []).filter(a=>a.url).map(a => ({ name:a.name, url:a.url, thumbUrl:a.thumbUrl||'' })),
      adminTasks: (c.adminTasks || [])
    }));
    const result = await postForm({ action:'syncCases', phone: store.profile.phone, name: store.profile.name || '', cases: summary });
    if (!result.ok) {
      console.error('❌ فشلت مزامنة القضايا مع الشيت:', result);
    } else if (!result.data.success) {
      console.error('❌ فشلت مزامنة القضايا مع الشيت:', result.data.error || result.data);
      if (result.data.error && !sessionStorage.getItem('cases_sheet_warned')) {
        sessionStorage.setItem('cases_sheet_warned','1');
        alert('⚠️ لم تتم مزامنة القضايا مع Google Sheets:\n' + result.data.error);
      }
    }
  }, 800); // تأخير بسيط عشان ميبعتش طلب مع كل حرف/تعديل سريع
  syncSessionsToSheet();
}

// يبعت كل الجلسات القادمة للشيت — يُستخدم من الباك إند لإرسال تذكير واتساب قبل 24 ساعة
let sessionsSyncTimer = null;
function syncSessionsToSheet() {
  clearTimeout(sessionsSyncTimer);
  sessionsSyncTimer = setTimeout(async () => {
    if (!store.profile?.phone) return;
    const sessions = store.cases.flatMap(c => (c.sessions||[])
      .filter(s => s.status === 'upcoming')
      .map(s => ({
        sessId: s.id,
        caseId: c.id,
        caseName: c.name,
        lawyerPhone: store.profile.phone,
        date: s.date,
        time: s.time || '10:00',
        desc: s.desc || 'جلسة'
      })));
    const result = await postForm({ action:'syncSessions', phone: store.profile.phone, lawyerName: store.profile.name || '', sessions });
    if (!result.ok) console.warn('⚠️ sessions sync may have failed:', result);
  }, 800);
}

// كل ما يفتح التطبيق (أو يعمل تحديث يدوي): يسحب الخطة والرصيد الإضافي
async function syncSubscriberRecord() {
  if (!store.profile?.phone) return;
  try {
    const data = await jsonpGet({ phone: store.profile.phone, t: Date.now() });

    // لو مسحته من الشيت → امسح التسجيل المحلي وأرجعه لشاشة التسجيل (لازم يسجل تاني)
    if (data.notFound) {
      store.profile = null;
      store.subscription = null;
      safeSet('qd_profile', 'null');
      safeSet('qd_subscription', 'null');
      save();
      location.reload();
      return;
    }

    const notices = [];

    // لو الخطة اتغيرت (اشتراك جديد اتفعّل يدويًا من الشيت) → طبّقها فوراً ووضّح للعميل
    if (data.plan && data.plan !== store.subscription?.plan) {
      const oldPlanLabel = PLANS[store.subscription?.plan]?.label || '';
      store.subscription.plan = data.plan;
      if (data.plan !== 'trial') {
        const until = new Date(); until.setDate(until.getDate() + 30);
        store.subscription.paidUntil = until.toISOString();
      }
      store.subscription.weekStart = getWeekStart();
      store.subscription.aiUsedThisWeek = 0;
      store.subscription.legalUsedThisWeek = 0;
      save();
      notices.push(`✅ تم تفعيل باقة "${PLANS[data.plan].label}" لحسابك${oldPlanLabel ? ` (كانت ${oldPlanLabel})` : ''}!`);
    }

    // رصيد الخدمات الإضافية المدفوعة (بيحدّثه صاحب المشروع يدويًا في الشيت بعد كل عملية شراء)
    if (typeof data.extraAi === 'number' && data.extraAi !== store.subscription.extraAiGranted) {
      const added = data.extraAi - (store.subscription.extraAiGranted||0);
      store.subscription.extraAiGranted = data.extraAi;
      save();
      if (added > 0) notices.push(`⚡ تم إضافة ${added} استخدام إضافي لرصيدك.`);
    }

    // إشعار مرئي واضح للعميل (مش تحديث صامت)
    if (notices.length) alert(notices.join('\n'));
  } catch(e) { console.warn('sync error:', e); }
}

// ─── STORE (safe storage wrapper) ─────────────────────────
let memoryFallback = {};
let storageBlocked = false;
function safeGet(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v === null ? fallback : v;
  } catch (e) {
    storageBlocked = true;
    return (key in memoryFallback) ? memoryFallback[key] : fallback;
  }
}
function safeSet(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch (e) {
    storageBlocked = true;
    memoryFallback[key] = value;
  }
}

let store = {
  profile: JSON.parse(safeGet('qd_profile', 'null')),
  cases: JSON.parse(safeGet('qd_cases', '[]')),
  subscription: JSON.parse(safeGet('qd_subscription', 'null'))
};

  safeSet('qd_profile', 'null');
  safeSet('qd_subscription', 'null');

}
function save() {
  safeSet('qd_profile', JSON.stringify(store.profile));

}

const TRIAL_DAYS = 14;

function initSubscription() {
  if (!store.subscription) {
    store.subscription = {
      plan: 'trial',
      signupDate: new Date().toISOString(),
      paidUntil: null, // تاريخ نهاية الاشتراك المدفوع (يتحدد بعد ربط بوابة الدفع فعليًا)
      weekStart: getWeekStart(),
      aiUsedThisWeek: 0,
      legalUsedThisWeek: 0,
      extraAiGranted: 0, extraAiUsed: 0       // خدمات إضافية عامة (بوست/مقال/تحليل) خارج حدود الباقة
    };
    save();
  }
  resetWeeklyQuotaIfNeeded();
}

function getWeekStart() {
  const d = new Date();
  const day = d.getDay();
  d.setDate(d.getDate() - day);
  return d.toISOString().split('T')[0];
}

function resetWeeklyQuotaIfNeeded() {
  const sub = store.subscription;
  if (sub.extraAiGranted === undefined) sub.extraAiGranted = 0;
  if (sub.extraAiUsed === undefined) sub.extraAiUsed = 0;
  const currentWeek = getWeekStart();
  if (store.subscription.weekStart !== currentWeek) {
    store.subscription.weekStart = currentWeek;
    store.subscription.aiUsedThisWeek = 0;
    store.subscription.legalUsedThisWeek = 0;
    save();
  }
}

function trialDaysLeft() {
  const sub = store.subscription;
  const signup = new Date(sub.signupDate);
  const now = new Date();
  const daysPassed = Math.floor((now - signup) / (1000*60*60*24));
  return Math.max(0, TRIAL_DAYS - daysPassed);
}

// التطبيق مقفول لو: كان في التجربة المجانية والأسبوع خلص، وملوش اشتراك مدفوع ساري
function isAppLocked() {
  if (isAdminAccount()) return false; // حساب المالك مفتوح دايمًا بلا قيود
  const sub = store.subscription;
  if (sub.plan === 'trial') {
    return trialDaysLeft() <= 0;
  }
  // خطة مدفوعة: لو فيه تاريخ انتهاء اشتراك ومر عليه (هيتفعل فعليًا بعد ربط بوابة الدفع)
  if (sub.paidUntil && new Date(sub.paidUntil) < new Date()) {
    return true;
  }
  return false;
}

// يتحقق من إمكانية استخدام ميزة ذكاء اصطناعي (بوست/تحليل/مقال) وينقص من الرصيد لو مسموح
function checkAndConsumeAIQuota() {
  if (isAdminAccount()) return true; // حساب المالك بلا حدود
  resetWeeklyQuotaIfNeeded();
  const sub = store.subscription;
  const plan = PLANS[sub.plan];
  if (sub.aiUsedThisWeek < plan.aiQuota) { sub.aiUsedThisWeek++; save(); return true; }
  // خارج حدود الباقة → جرّب الرصيد الإضافي المدفوع
  const extraLeft = Math.max(0, (sub.extraAiGranted||0) - (sub.extraAiUsed||0));
  if (extraLeft > 0) { sub.extraAiUsed = (sub.extraAiUsed||0) + 1; save(); return true; }
  alert(`استهلكت رصيد هذا الأسبوع من ميزات الذكاء الاصطناعي (${plan.aiQuota} استخدامات). تقدر تشتري رصيد إضافي فورًا من "الباقات → خدمات إضافية"، أو تستنى تجدد الأسبوع الجاي.`);
  return false;
}

function checkAndConsumeLegalQuota() {
  if (isAdminAccount()) return true; // حساب المالك بلا حدود
  resetWeeklyQuotaIfNeeded();
  const sub = store.subscription;
  const plan = PLANS[sub.plan];
  if (plan.legalAssistant && sub.legalUsedThisWeek < plan.legalQuota) {
    sub.legalUsedThisWeek++; save(); return true;
  }
  if (!plan.legalAssistant) {
    alert('الباحث القانوني متاح من باقة استئناف فما فوق.');
  } else {
    alert(sub.plan==='trial'
      ? 'استخدمت سؤالك المجاني الوحيد في الباحث القانوني لفترة التجربة. اشترك في باقة لتحصل على المزيد.'
      : `استهلكت رصيد هذا الأسبوع من الباحث القانوني (${plan.legalQuota} سؤال). هيتجدد الرصيد الأسبوع الجاي.`);
  }
  return false;
}

function remainingAIQuota() {
  resetWeeklyQuotaIfNeeded();
  const sub = store.subscription;
  const plan = PLANS[sub.plan];
  return Math.max(0, plan.aiQuota - sub.aiUsedThisWeek);
}

function remainingLegalQuota() {
  resetWeeklyQuotaIfNeeded();
  const sub = store.subscription;
  const plan = PLANS[sub.plan];
  if (!plan.legalAssistant) return 0;
  return Math.max(0, plan.legalQuota - sub.legalUsedThisWeek);
}

function remainingExtraAI() {
  resetWeeklyQuotaIfNeeded();
  const sub = store.subscription;
  return Math.max(0, (sub.extraAiGranted||0) - (sub.extraAiUsed||0));
}

function setPlan(planKey) {
  if (!PLANS[planKey]) return;
  store.subscription.plan = planKey;
  if (planKey !== 'trial') {
    const until = new Date(); until.setDate(until.getDate() + 30);
    store.subscription.paidUntil = until.toISOString();
  }
  store.subscription.weekStart = getWeekStart();
  store.subscription.aiUsedThisWeek = 0;
  store.subscription.legalUsedThisWeek = 0;
  save();
  syncSubscriberRecord();
  alert(`تم تفعيل باقة "${PLANS[planKey].label}" ✅ (ملاحظة: التفعيل هنا تجريبي محليًا — التفعيل الحقيقي هيحتاج ربط ببوابة دفع لاحقًا)`);
  closeModal();
  if (!isAppLocked()) { initApp(); } else { showPlansPage(); }
}

async function resolveOfficeAndRole(user) {
  const { data: membership } = await sb
    .from('office_members')
    .select('office_id, role, full_name')
    .eq('user_id', user.id)
    .eq('active', true)
    .limit(1)
    .maybeSingle();

  if (membership) {
    currentOfficeId = membership.office_id;
    currentUserRole = membership.role;
    store.profile = { name: membership.full_name, phone: '' };
  } else {
    document.getElementById('onboard')?.remove();
    showFirstOfficeSetup(user);
    return;
  }
  save();
  initApp();
}

function scheduleReminders() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(p => { if (p==='granted') doReminders(); });
  } else if (Notification.permission === 'granted') {
    doReminders();
  }
}

function doReminders() {
  const tmr = getTomorrow();
  const allSess = store.cases.flatMap(c => c.sessions.map(s => ({...s, caseName:c.name})));
  const alerts = allSess.filter(s => s.status==='upcoming' && s.date===tmr);
  alerts.forEach(s => {
    new Notification('⚖️ تذكير جلسة غداً', {
      body: `${s.caseName} — الساعة ${s.time}`,
      icon: ''
    });
  });
  const overdue = store.cases.filter(c => c.status !== 'closed' && (c.totalFee - c.paid) > 0);
  if (overdue.length > 0) {
    document.getElementById('notif-dot').classList.add('show');
  }
}

function checkNotifDot() {
  const tmr = getTomorrow();
  const allSess = store.cases.flatMap(c => c.sessions.map(s => ({...s})));
  const hasTmr = allSess.some(s => s.status==='upcoming' && s.date===tmr);
  const hasOverdue = store.cases.some(c => c.status!=='closed' && (c.totalFee-c.paid)>0);
  if (hasTmr || hasOverdue) document.getElementById('notif-dot').classList.add('show');
}

function getTomorrow() {
  const t = new Date(); t.setDate(t.getDate()+1);
  return t.toISOString().split('T')[0];
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}
// عدد الأيام المتبقية على تاريخ معين (سالب لو التاريخ فات)
function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr); target.setHours(0,0,0,0);
  return Math.round((target - today) / (1000*60*60*24));
}
function getCurrentYear() { return new Date().getFullYear(); }
function buildCaseName(client, clientRole, opponent, opponentRole) {
  const c1 = clientRole ? `${client} (${clientRole})` : client;
  if (opponent) {
    const c2 = opponentRole ? `${opponent} (${opponentRole})` : opponent;
    return `${c1} ضد ${c2}`;
  }
  return c1;
}

// رابط الـ Worker بتاعك على Cloudflare — غيّره بعد النشر لو الرابط مختلف
const AI_WORKER_URL = 'https://qadyaati.maroooahmedddhh.workers.dev/';

async function callAI(promptText, maxTokens = 800) {
  const resp = await fetch(AI_WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      prompt: promptText,
      maxTokens: maxTokens
    })
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || 'تعذر الاتصال بالخادم');
  const text = data.content?.map(b=>b.text||'').join('') || '';
  if (!text) throw new Error('لم يتم الحصول على رد من الذكاء الاصطناعي');
  return text.trim();
}

async function sendAIChat(preset) {
  if (!checkAndConsumeLegalQuota()) return;
  const inputEl = document.getElementById('chat-input');
  const text = (preset !== undefined ? preset : inputEl.value.trim());
  if (!text) return;
  if (inputEl) inputEl.value = '';
  aiChatHistory.push({role:'user', text});
  renderChatMsgs();
  aiChatHistory.push({role:'ai', text:'⏳ جاري التفكير...', loading:true});
  renderChatMsgs();

  const casesSummary = store.cases.slice(0,15).map(c=>`${c.name} (${c.type}, ${c.status}, عميل: ${c.client})`).join(' | ');
  const historyText = aiChatHistory.filter(m=>!m.loading).slice(-8).map(m=>`${m.role==='user'?'المحامي':'المساعد'}: ${m.text}`).join('\n');

  const prompt = `أنت مساعد قانوني ذكي متخصص في القانون المصري، تساعد محامياً مصرياً في عمله اليومي. مهامك تشمل: تلخيص قضايا، اقتراح دفوع قانونية، صياغة أولية لمذكرات وإنذارات وعقود، توضيح مواعيد الاستئناف والطعن وسقوط المواعيد القانونية، والإشارة العامة لمبادئ قانونية معروفة.
تنبيه مهم: أنت أداة مساعدة وليست بديلاً عن المراجعة القانونية الدقيقة من المحامي نفسه، فلا تجزم بأرقام أحكام نقض أو مواد قانونية إلا لو كنت متأكداً، وانصح بالمراجعة عند الشك.

بعض قضايا المكتب المسجلة (للسياق فقط، استخدمها لو السؤال يخصها): ${casesSummary || 'لا توجد قضايا مسجلة بعد'}

سياق المحادثة السابق:
${historyText}

اكتب رداً عملياً ومباشراً بالعربية الفصحى، منظم بنقاط لو الموضوع يحتاج ذلك.`;

  try {
    const reply = await callAI(prompt, 1200);
    aiChatHistory = aiChatHistory.filter(m=>!m.loading);
    aiChatHistory.push({role:'ai', text: reply});
  } catch(e) {
    aiChatHistory = aiChatHistory.filter(m=>!m.loading);
    aiChatHistory.push({role:'ai', text: '⚠️ ' + (e.message || 'تعذر الاتصال بالذكاء الاصطناعي.')});
  }
  renderChatMsgs();
}

function renderChatMsgs() {
  const el = document.getElementById('chat-msgs');
  if (!el) return;
  el.innerHTML = aiChatHistory.map(m => `<div class="chat-msg ${m.role==='user'?'user':'ai'}">${(m.text||'').replace(/</g,'&lt;')}</div>`).join('');
  el.scrollTop = el.scrollHeight;
}

// ─── صورة قانونية تصميمية جاهزة للمنشور (تصميم كامل v2) ────
function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  const lines = [];
  words.forEach(word => {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = word; }
    else { line = test; }
  });
  if (line) lines.push(line);
  const startY = y - (lines.length-1)*lineHeight/2;
  lines.forEach((l,i) => ctx.fillText(l, x, startY + i*lineHeight));
  return lines.length;
}

// يرجع عدد السطور بدون رسم (لحساب الارتفاعات مقدمًا)
function measureWrapLines(ctx, text, maxWidth) {
  const words = text.split(' ');
  let line = '';
  let count = 0;
  words.forEach(word => {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) { count++; line = word; }
    else { line = test; }
  });
  if (line) count++;
  return count || 1;
}

// رسم شاكوش قاضٍ (Gavel) عالي التفاصيل
function drawGavel(ctx, cx, cy, scale) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.rotate(-0.62); // ميل أنيق ~ -35deg

  // ظل ناعم تحت الشاكوش
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 22;
  ctx.shadowOffsetY = 10;

  // المقبض (Handle)
  const handleGrad = ctx.createLinearGradient(-10, -95, 10, 70);
  handleGrad.addColorStop(0, '#e7c976');
  handleGrad.addColorStop(0.5, '#c9a84c');
  handleGrad.addColorStop(1, '#8a6f2c');
  ctx.fillStyle = handleGrad;
  roundRectPath(ctx, -8, -95, 16, 165, 8);
  ctx.fill();

  // مفصلة معدنية أعلى المقبض (Collar)
  ctx.fillStyle = '#efd693';
  roundRectPath(ctx, -13, -18, 26, 14, 5);
  ctx.fill();

  ctx.restore();

  // رأس الشاكوش (الأسطوانة)
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 26;
  ctx.shadowOffsetY = 12;
  const headGrad = ctx.createLinearGradient(-95, -70, 95, -10);
  headGrad.addColorStop(0, '#f1d98a');
  headGrad.addColorStop(0.45, '#c9a84c');
  headGrad.addColorStop(1, '#7f6425');
  ctx.fillStyle = headGrad;
  roundRectPath(ctx, -95, -70, 190, 62, 16);
  ctx.fill();
  ctx.restore();

  // حلقات زخرفية على طرفي الرأس
  ['left','right'].forEach(side=>{
    const x = side==='left' ? -95 : 65;
    const ringGrad = ctx.createLinearGradient(x, -70, x+30, -8);
    ringGrad.addColorStop(0, '#fff3cf');
    ringGrad.addColorStop(1, '#a5822f');
    ctx.fillStyle = ringGrad;
    roundRectPath(ctx, x, -74, 30, 70, 10);
    ctx.fill();
  });

  // خط لمعان علوي على الرأس
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-78,-58); ctx.lineTo(70,-58); ctx.stroke();

  ctx.restore();

  // القاعدة الخشبية (Sound Block) — تُرسم بدون دوران
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 18;
  ctx.shadowOffsetY = 8;
  const baseGrad = ctx.createLinearGradient(-100, 60, 100, 118);
  baseGrad.addColorStop(0, '#3a2c14');
  baseGrad.addColorStop(0.5, '#5a4620');
  baseGrad.addColorStop(1, '#2a2010');
  ctx.fillStyle = baseGrad;
  roundRectPath(ctx, -100, 66, 200, 40, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(201,168,76,0.5)';
  ctx.lineWidth = 2;
  roundRectPath(ctx, -100, 66, 200, 40, 10);
  ctx.stroke();
  ctx.restore();
}

// رسم ميزان عدل ذهبي عالي التفاصيل (Scale of Justice)
function drawJusticeScale(ctx, cx, cy, scale) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 24;
  ctx.shadowOffsetY = 10;

  const gold = (x0,y0,x1,y1) => {
    const g = ctx.createLinearGradient(x0,y0,x1,y1);
    g.addColorStop(0, '#fff3cf');
    g.addColorStop(0.45, '#e7c976');
    g.addColorStop(0.75, '#c9a84c');
    g.addColorStop(1, '#8a6f2c');
    return g;
  };

  // القاعدة السفلية
  ctx.fillStyle = gold(-90,150,90,175);
  roundRectPath(ctx, -90, 150, 180, 22, 8);
  ctx.fill();
  // العمود الرأسي
  ctx.fillStyle = gold(-9,-140,9,150);
  roundRectPath(ctx, -9, -140, 18, 290, 6);
  ctx.fill();
  // قاعدة صغيرة أسفل العمود مباشرة
  ctx.fillStyle = gold(-40,140,40,158);
  roundRectPath(ctx, -40, 140, 80, 16, 6);
  ctx.fill();

  // القمة (تاج زخرفي أعلى العمود)
  ctx.beginPath();
  ctx.moveTo(0,-168); ctx.lineTo(-14,-140); ctx.lineTo(14,-140); ctx.closePath();
  ctx.fillStyle = gold(-14,-168,14,-140);
  ctx.fill();
  ctx.beginPath(); ctx.arc(0,-172,9,0,Math.PI*2); ctx.fillStyle = gold(-9,-181,9,-163); ctx.fill();

  // الذراع الأفقي
  ctx.fillStyle = gold(-135,-146,135,-134);
  roundRectPath(ctx, -135, -146, 270, 12, 5);
  ctx.fill();
  // مفصلة وسط الذراع
  ctx.beginPath(); ctx.arc(0,-140,11,0,Math.PI*2);
  ctx.fillStyle = gold(-11,-151,11,-129); ctx.fill();

  ctx.restore();

  // دالة رسم طبق الميزان مع سلاسل
  const drawPan = (armX) => {
    const panY = -60;
    // سلاسل
    ctx.strokeStyle = 'rgba(201,168,76,0.85)';
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.moveTo(armX-58, -140); ctx.lineTo(armX, panY);
    ctx.moveTo(armX-29, -142); ctx.lineTo(armX, panY);
    ctx.moveTo(armX, -142);    ctx.lineTo(armX, panY);
    ctx.moveTo(armX+29, -142); ctx.lineTo(armX, panY);
    ctx.moveTo(armX+58, -140); ctx.lineTo(armX, panY);
    ctx.stroke();

    // الطبق
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.45)';
    ctx.shadowBlur = 16;
    ctx.shadowOffsetY = 6;
    ctx.beginPath();
    ctx.ellipse(armX, panY, 62, 16, 0, 0, Math.PI*2);
    const panGrad = ctx.createLinearGradient(armX-62,panY-14,armX+62,panY+14);
    panGrad.addColorStop(0, '#fff3cf');
    panGrad.addColorStop(0.5, '#c9a84c');
    panGrad.addColorStop(1, '#7f6425');
    ctx.fillStyle = panGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  };

  drawPan(-124);
  drawPan(124);

  ctx.restore();
}

function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function drawSocialPostImage(headline, bodyText, websiteLink) {
  const canvas = document.getElementById('mk-social-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // خلفية متدرجة عميقة
  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0, '#0a0e1c');
  bg.addColorStop(0.55, '#121a30');
  bg.addColorStop(1, '#1c2740');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // توهج ذهبي ناعم خلف الشاكوش
  const glow = ctx.createRadialGradient(W/2, 300, 20, W/2, 300, 340);
  glow.addColorStop(0, 'rgba(201,168,76,0.28)');
  glow.addColorStop(1, 'rgba(201,168,76,0)');
  ctx.fillStyle = glow; ctx.fillRect(0,0,W,H);

  // إطار مزدوج ذهبي
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 5;
  ctx.strokeRect(26,26,W-52,H-52);
  ctx.strokeStyle = 'rgba(201,168,76,0.35)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(42,42,W-84,H-84);

  ctx.direction = 'rtl'; ctx.textAlign = 'center';

  // توهج ذهبي إضافي خلف الميزان
  const glow2 = ctx.createRadialGradient(W/2, 300, 10, W/2, 300, 260);
  glow2.addColorStop(0, 'rgba(255,243,207,0.35)');
  glow2.addColorStop(1, 'rgba(255,243,207,0)');
  ctx.fillStyle = glow2; ctx.fillRect(0,0,W,H);

  // ميزان العدل الذهبي — العنصر البصري الرئيسي
  drawJusticeScale(ctx, W/2, 300, 1.05);

  // تحضير كلمات العنوان (6-8 كلمات فقط، ذهبي بولد يملأ الصورة)
  let words = (headline || 'استشارة قانونية موثوقة تبني الثقة').trim().split(/\s+/);
  if (words.length > 8) words = words.slice(0, 8);
  const headlineText = words.join(' ');

  // تدرج ذهبي لامع للنص
  const textGrad = ctx.createLinearGradient(W/2-320, 560, W/2+320, 900);
  textGrad.addColorStop(0, '#fff6d8');
  textGrad.addColorStop(0.35, '#f1d98a');
  textGrad.addColorStop(0.6, '#c9a84c');
  textGrad.addColorStop(1, '#a5822f');

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 14;
  ctx.shadowOffsetY = 4;
  ctx.fillStyle = textGrad;
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';

  // المساحة المتاحة للعنوان: بعد الميزان وقبل شريط الاسم
  const areaTop = 490, areaBottom = 1090, areaMaxWidth = W - 110;
  const areaHeight = areaBottom - areaTop;

  // نلاقي أكبر حجم خط ممكن يملأ المساحة دي كاملة من غير ما يخرج عنها
  let fontSize = 150;
  let lines, lineHeight;
  do {
    fontSize -= 2;
    ctx.font = `900 ${fontSize}px "Segoe UI", Tahoma, Arial`;
    lines = wrapTextLines(ctx, headlineText, areaMaxWidth, fontSize);
    lineHeight = fontSize * 1.14;
    var totalHeight = lines.length * lineHeight;
    var maxLineWidth = Math.max(...lines.map(l => ctx.measureText(l).width));
  } while (fontSize > 34 && (totalHeight > areaHeight || maxLineWidth > areaMaxWidth));

  const centerY = areaTop + areaHeight/2;
  const startY = centerY - ((lines.length-1) * lineHeight)/2;
  lines.forEach((l,i) => {
    ctx.strokeText(l, W/2, startY + i*lineHeight);
    ctx.fillText(l, W/2, startY + i*lineHeight);
  });
  ctx.restore();

  const afterHeadlineY = startY + (lines.length-1)*lineHeight + Math.max(50, fontSize*0.55);

  // خط فاصل ذهبي
  ctx.strokeStyle = 'rgba(201,168,76,0.55)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2-100, afterHeadlineY); ctx.lineTo(W/2+100, afterHeadlineY); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2, afterHeadlineY, 4, 0, Math.PI*2); ctx.fillStyle='#c9a84c'; ctx.fill();

  // شريط اسم المستشار
  const name = store.profile?.name || 'المستشار';
  ctx.fillStyle = 'rgba(201,168,76,0.10)';
  roundRectPath(ctx, W/2-260, H-215, 520, 66, 14);
  ctx.fill();
  ctx.strokeStyle = 'rgba(201,168,76,0.4)'; ctx.lineWidth = 1.5;
  roundRectPath(ctx, W/2-260, H-215, 520, 66, 14);
  ctx.stroke();

  ctx.fillStyle = '#c9a84c';
  ctx.font = '700 32px "Segoe UI", Tahoma, Arial';
  ctx.fillText(`⚖️ المستشار ${name}`, W/2, H-175);

  // خط تذييل: الموقع الشخصي (لو موجود) أو الشعار الافتراضي
  ctx.fillStyle = '#8a93a8';
  ctx.font = '500 24px "Segoe UI", Tahoma, Arial';
  ctx.fillText(websiteLink ? `🔗 ${websiteLink}` : 'استشارات قانونية موثوقة', W/2, H-115);

  // علامة تطبيق قضيتي أسفل الصورة
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 20px "Segoe UI", Tahoma, Arial';
  ctx.fillText('قضيتي', W/2, H-68);
}

// تقسيم النص لأسطر بحجم خط معيّن (يُستخدم لحساب أفضل حجم يملأ الإطار)
function wrapTextLines(ctx, text, maxWidth, fontSize) {
  ctx.font = `900 ${fontSize}px "Segoe UI", Tahoma, Arial`;
  const words = text.split(' ');
  let line = '';
  const lines = [];
  words.forEach(word => {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = word; }
    else { line = test; }
  });
  if (line) lines.push(line);
  return lines;
}

  const totalPaid = store.cases.reduce((s,c)=>s+c.paid,0);
  const due = totalFee - totalPaid;
  const allSess = store.cases.flatMap(c=>c.sessions.map(s=>({...s,caseName:c.name})));
  const upcoming = allSess.filter(s=>s.status==='upcoming').sort((a,b)=>a.date.localeCompare(b.date));
  const overdueC = store.cases.filter(c=>c.status!=='closed'&&(c.totalFee-c.paid)>0);
  const types = {};
  store.cases.forEach(c=>{ types[c.type]=(types[c.type]||0)+1; });

  const prompt = `أنت مساعد قانوني ذكي لمحامٍ مصري. بناءً على البيانات التالية قدم تحليلاً عملياً وتوصيات:

function confirmDelete(id) {
  const c = store.cases.find(x=>x.id===id);
  if (!c) return;
  if (!confirm('حذف قضية "' + c.name + '"؟\n\nالجلسات ستُحذف، لكن السجل المالي سيبقى محفوظاً باسمها.')) return;
  const archive = JSON.parse(safeGet('qd_archive', '[]'));
  archive.push({ id:c.id, name:c.name, client:c.client, type:c.type, totalFee:c.totalFee, paid:c.paid, deletedAt: new Date().toLocaleDateString('ar-EG') });
  safeSet('qd_archive', JSON.stringify(archive));
  store.cases = store.cases.filter(x=>x.id!==id);
  save(); closeModal(); render();
}

  const upcoming = allSess.filter(s=>s.status==='upcoming').sort((a,b)=>a.date.localeCompare(b.date));

    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>

  else html += `<div style="font-size:13px;color:var(--td);padding:8px 0 14px;">لا جلسات قادمة</div>`;

function addCase() {
  const client = document.getElementById('f-client').value.trim();
  if (!client) { alert('أدخل اسم الموكل'); return; }
  const role = document.getElementById('f-role').value;
  const opponent = document.getElementById('f-opponent').value.trim();
  const oppRole = document.getElementById('f-opp-role').value;
  const numPart = document.getElementById('f-num').value.trim();
  const yearPart = document.getElementById('f-year').value.trim() || getCurrentYear();
  const caseNum = numPart ? `${numPart}/${yearPart}` : '';

  const adminTasksText = (document.getElementById('f-admin-tasks').value || '').trim();
  const adminTasks = adminTasksText
    ? adminTasksText.split('\n').map(t=>t.trim()).filter(Boolean).map(t=>({ id: Date.now()+Math.floor(Math.random()*1000), text:t, done:false }))
    : [];

  const newCase = {
    id:Date.now(),
    name: buildCaseName(client, role, opponent, oppRole),
    client, clientRole: role, opponent, opponentRole: oppRole,
    phone: document.getElementById('f-phone').value||'',
    type: document.getElementById('f-type').value,
    status: document.getElementById('f-status').value,
    totalFee: parseInt(document.getElementById('f-fee').value)||0, paid:0,
    court: document.getElementById('f-court').value,
    caseNum,
    notes: document.getElementById('f-notes').value,
    sessions:[], payments:[], attachments:[], adminTasks
  };
  store.cases.unshift(newCase);
  save(); closeModal(); render();
  syncCasesToSheet();

  // لو المستشار اختار ملفات وقت إضافة القضية، ارفعها فورًا وأضفها للقضية الجديدة
  const files = document.getElementById('f-attachments')?.files;
  if (files && files.length) uploadInitialAttachments(newCase.id, files);
}

// يرفع كل الملفات المختارة وقت إنشاء القضية ويضيفها للقضية بعد الرفع
async function uploadInitialAttachments(caseId, fileList) {
  for (const file of Array.from(fileList)) {
    const c = store.cases.find(x=>x.id===caseId);
    if (!c) return;
    const isPdf = file.type === 'application/pdf';
    if (!isPdf && !file.type.startsWith('image/')) continue;
    try {
      const dataUrl = isPdf
        ? await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); })
        : await compressImage(file, 1400, 0.8);
      const result = await uploadAttachmentToDrive(c, file.name, dataUrl, file.type);
      c.attachments = c.attachments || [];
      c.attachments.push({ name: file.name.split('.')[0], type: isPdf?'application/pdf':'image', url: result.url, thumbUrl: result.thumbUrl, addedAt: new Date().toLocaleDateString('ar-EG') });
      save(); render();
      syncCasesToSheet();
    } catch(e) {
      console.warn('initial attachment upload failed:', e);
    }
  }
}

function addAdminTask(caseId) {

  syncCasesToSheet();
}

function toggleAdminTask(caseId, taskId) {
  const c = store.cases.find(x=>x.id===caseId);
  const t = c?.adminTasks?.find(x=>x.id===taskId);
  if (!t) return;
  t.done = !t.done;
  save(); closeModal(); openCase(caseId);
  syncCasesToSheet();
}

function deleteAdminTask(caseId, taskId) {
  const c = store.cases.find(x=>x.id===caseId);
  if (!c || !c.adminTasks) return;
  c.adminTasks = c.adminTasks.filter(x=>x.id!==taskId);
  save(); closeModal(); openCase(caseId);
  syncCasesToSheet();
}

function triggerAttachUpload(caseId) {
  document.getElementById(`attach-input-${caseId}`).click();

function handleAttachFile(event, caseId) {
  const file = event.target.files[0];
  if (!file) return;
  const c = store.cases.find(x=>x.id===caseId);
  if (!c) return;
  const statusEl = document.getElementById(`attach-status-${caseId}`);
  statusEl.style.display = 'block';

  const desc = prompt('وصف المستند (مثال: صحيفة الدعوى، الحكم الابتدائي، إيصال دفعة):', file.name.split('.')[0]) || file.name;
  const isPdf = file.type === 'application/pdf';

  const uploadIt = (dataUrl) => {
    uploadAttachmentToDrive(c, file.name, dataUrl, file.type)
      .then(result => {
        saveAttachment(caseId, { name: desc, type: isPdf ? 'application/pdf' : 'image', url: result.url, thumbUrl: result.thumbUrl, addedAt: new Date().toLocaleDateString('ar-EG') });
      })
      .catch(() => alert('⚠️ تعذر رفع الملف. تأكد من اتصال الإنترنت وحاول مرة أخرى.'))
      .finally(() => { statusEl.style.display = 'none'; event.target.value = ''; });
  };

  if (isPdf) {
    const reader = new FileReader();
    reader.onload = () => uploadIt(reader.result);
    reader.readAsDataURL(file);
  } else if (file.type.startsWith('image/')) {
    compressImage(file, 1400, 0.8).then(uploadIt).catch(() => {
      alert('تعذر معالجة الصورة');
      statusEl.style.display = 'none';
    });
  } else {
    alert('نوع الملف غير مدعوم — اختر صورة أو PDF');
    statusEl.style.display = 'none';
  }
}

// يرفع المستند إلى Google Drive عبر Apps Script ويرجع رابط مباشر
async function uploadAttachmentToDrive(c, filename, dataUrl, mimeType) {
  const base64 = dataUrl.split(',')[1];
  const result = await postForm({
    action: 'uploadFile',
    phone: store.profile?.phone || '',
    caseId: c.id,
    caseName: c.name,
    filename,
    mimeType,
    base64
  }, 30000); // مهلة أطول لأن رفع الملف بياخد وقت
  if (!result.ok || !result.data.success || !result.data.url) {
    throw new Error((result.data && result.data.error) || 'upload failed');
  }
  return { url: result.data.url, thumbUrl: result.data.thumbUrl };
}

function compressImage(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => {
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function saveAttachment(caseId, attachment) {
  const c = store.cases.find(x=>x.id===caseId);
  if (!c) return;
  if (!c.attachments) c.attachments = [];
  c.attachments.push(attachment);
  try {
    save();
    closeModal(); openCase(caseId);
    syncCasesToSheet();
  } catch(e) {
    c.attachments.pop();
    alert('⚠️ تعذر حفظ المرفق. حاول مرة أخرى.');
  }
}

function deleteAttachment(caseId, idx) {
  if (!confirm('حذف هذا المستند؟')) return;
  const c = store.cases.find(x=>x.id===caseId);
  if (!c || !c.attachments) return;
  c.attachments.splice(idx, 1);
  save(); closeModal(); openCase(caseId);
  syncCasesToSheet();
}

function viewAttachment(caseId, idx) {
  const c = store.cases.find(x=>x.id===caseId);
  const att = c?.attachments?.[idx];
  if (!att) return;
  if (att.url) { window.open(att.url, '_blank'); return; }
  // مستندات قديمة كانت متخزنة محليًا كـ dataUrl (قبل ربط Google Drive)
  const w = window.open('', '_blank');
  if (!w) { alert('من فضلك اسمح للتطبيق بفتح نوافذ جديدة'); return; }
  if (att.type === 'application/pdf') {
    w.document.write(`<iframe src="${att.dataUrl}" style="width:100vw;height:100vh;border:none"></iframe>`);
  } else {
    w.document.write(`<body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh">
      <img src="${att.dataUrl}" style="max-width:100%;max-height:100vh"/>
    </body>`);
  }
  w.document.close();
}

function recordPayment(id) {
  const c = store.cases.find(x=>x.id===id);
  if (!c) return;
  const due = c.totalFee - c.paid;
  if (due<=0) { alert('تم تحصيل كامل الأتعاب'); return; }
  const amt = prompt(`المتبقي: ${due.toLocaleString()} ج.م\nأدخل مبلغ الدفعة:`);
  if (!amt||isNaN(amt)||parseInt(amt)<=0) return;
  c.paid = Math.min(c.paid+parseInt(amt), c.totalFee);
  save(); render();
}

function deleteCase(id) {
  if (!confirm('حذف هذه القضية نهائياً؟')) return;
  store.cases = store.cases.filter(c=>c.id!==id);
  save(); closeModal(); render();
  syncCasesToSheet();
  syncSessionsToSheet();
}

function runSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const resultsEl = document.getElementById('search-results');
  if (!q) { resultsEl.innerHTML = '<div style="font-size:13px;color:var(--td);text-align:center;padding:20px 0">اكتب أي حرف للبحث الفوري</div>'; return; }

  const matchedCases = store.cases.filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.client||'').toLowerCase().includes(q) ||
    (c.opponent||'').toLowerCase().includes(q) ||
    (c.type||'').toLowerCase().includes(q) ||
    (c.court||'').toLowerCase().includes(q) ||
    (c.caseNum||'').toLowerCase().includes(q) ||
    (c.notes||'').toLowerCase().includes(q)
  );

  const matchedSessions = [];
  store.cases.forEach(c => {
    (c.sessions||[]).forEach(s => {
      if ((s.desc||'').toLowerCase().includes(q) || c.name.toLowerCase().includes(q)) {
        matchedSessions.push({ ...s, caseName: c.name, caseId: c.id });
      }
    });
  });
  const filteredSessions = matchedSessions.filter(s => (s.desc||'').toLowerCase().includes(q));

  if (!matchedCases.length && !filteredSessions.length) {
    resultsEl.innerHTML = '<div style="font-size:13px;color:var(--td);text-align:center;padding:20px 0">لا توجد نتائج مطابقة</div>';
    return;
  }

  let html = '';
  if (matchedCases.length) {
    html += `<div class="sct">القضايا (${matchedCases.length})</div>`;
    matchedCases.forEach(c => {
      const due = c.totalFee - c.paid;
      html += `<div class="cc ${c.status}" onclick="closeModal();openCase(${c.id})" style="cursor:pointer">
        <div class="cc-body">
          <div class="cc-top">
            <div class="cc-name">${c.name}</div>
            <span class="badge ${c.status==='active'?'ba':c.status==='pending'?'bp':c.status==='new'?'bn':'bc'}">${statusLabel(c.status)}</span>
          </div>
          <div class="cc-meta"><span>👤 الموكل: ${c.client}${c.clientRole?' ('+c.clientRole+')':''}</span><span>⚖️ ${c.type}</span>${c.opponent?`<span>⚔️ الخصم: ${c.opponent}</span>`:''}</div>
          <div class="cc-bot"><div class="cc-fee">${c.totalFee.toLocaleString()} ج${due>0?` · <span style="color:var(--err);font-size:12px;">متبقي ${due.toLocaleString()}</span>`:''}</div></div>
        </div>
      </div>`;
    });
  }
  if (filteredSessions.length) {
    html += `<div class="sct">الجلسات (${filteredSessions.length})</div>`;
    filteredSessions.forEach(s => {
      const d = new Date(s.date);
      html += `<div class="sc" onclick="closeModal();openCase(${s.caseId})" style="cursor:pointer">
        <div class="sd"><div class="sdd">${d.getDate()}</div><div class="sdm">${MONTHS[d.getMonth()]}</div></div>
        <div class="si">
          <div class="sn">${s.caseName}</div>
          <div class="sd2">${s.desc}</div>
          <div class="st2">⏰ ${s.time} · ${DAYS[d.getDay()]}</div>
        </div>
        <span class="badge ${s.status==='done'?'bc':'ba'}">${s.status==='done'?'✓':'قادمة'}</span>
      </div>`;
    });
  }
  resultsEl.innerHTML = html;
}

function showNotifPanel() {
  const tmr = getTomorrow();
  const today = getToday();
  const allSess = store.cases.flatMap(c=>c.sessions.map(s=>({...s,caseName:c.name})));
  const alerts = allSess.filter(s=>s.status==='upcoming'&&(s.date===tmr||s.date===today));
  const overdue = store.cases.filter(c=>c.status!=='closed'&&(c.totalFee-c.paid)>0);

  let html = `<div class="mh"></div><h2>🔔 التنبيهات</h2>`;
  if (!alerts.length && !overdue.length) {
    html += `<div style="text-align:center;padding:24px;color:var(--td)">لا تنبيهات حالياً ✅</div>`;
  } else {
    if (alerts.length) {
      html += `<div class="sct">جلسات اليوم / غداً</div>`;
      alerts.forEach(s=>{ html += `<div class="abn" style="margin-bottom:8px"><span>⚠️</span><div><div class="abt">${s.caseName}</div><div class="abs">${s.date} — ${s.time}</div></div></div>`; });
    }
    if (overdue.length) {
      html += `<div class="sct">أتعاب متأخرة</div>`;
      overdue.forEach(c=>{ html += `<div class="obn" style="margin-bottom:8px"><span>💰</span><div><div class="obt">${c.name}</div><div style="font-size:12px;color:var(--err);opacity:.8">متبقي ${(c.totalFee-c.paid).toLocaleString()} ج</div></div></div>`; });
    }
  }
  html += `<div style="margin-top:16px;padding:12px;background:var(--gold-bg);border:1px solid var(--gold-br);border-radius:var(--r);font-size:12px;color:var(--gold-d)">
    📲 تنبيهات SMS على: <strong style="color:var(--gold)">${store.profile?.phone||"—"}</strong>
  </div>`;
  html += `<div class="br"><button class="bcan" onclick="closeModal()">إغلاق</button></div>`;
  mset(html);
}

async function loadTeamList() {
  const el = document.getElementById('team-list');
  const { data, error } = await sb.from('office_members')
    .select('id, user_id, role, full_name, active')
    .eq('office_id', currentOfficeId);
  if (error) { el.innerHTML = `<div style="color:var(--err);font-size:12px">${error.message}</div>`; return; }
  if (!data.length) { el.innerHTML = '<div style="font-size:13px;color:var(--td)">لا يوجد أعضاء بعد</div>'; return; }
  el.innerHTML = data.map(m => `
    <div class="card" style="margin-bottom:8px;padding:11px 13px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;font-size:14px">${m.full_name}</div>
          <div style="font-size:12px;color:var(--gold)">${ROLE_LABELS[m.role]||m.role}</div>
        </div>
        ${m.role!=='admin' ? `<button onclick="toggleMemberActive('${m.id}', ${!m.active})" style="background:${m.active?'var(--err-bg)':'var(--ok-bg)'};border:1px solid ${m.active?'var(--err-br)':'var(--ok-br)'};color:${m.active?'var(--err)':'var(--ok)'};border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:inherit">${m.active?'تعطيل':'تفعيل'}</button>` : '<span style="font-size:11px;color:var(--td)">صاحب المكتب</span>'}
      </div>
    </div>`).join('');
}

async function inviteTeamMember() {
  const email = document.getElementById('tm-email').value.trim();
  const fullName = document.getElementById('tm-fullname').value.trim();
  const role = document.getElementById('tm-role').value;
  if (!email||!fullName) { alert('أدخل البريد والاسم'); return; }

  const { data: profile, error: pErr } = await sb.from('profiles').select('id').eq('email', email).maybeSingle();
  if (pErr || !profile) { alert('لم يتم العثور على مستخدم بهذا البريد. اطلب منه إنشاء حساب أولاً من شاشة الدخول.'); return; }

  const { error } = await sb.from('office_members').insert({
    office_id: currentOfficeId, user_id: profile.id, role, full_name: fullName
  });
  if (error) { alert('خطأ: '+error.message); return; }
  document.getElementById('tm-email').value='';
  document.getElementById('tm-fullname').value='';
  loadTeamList();
}

async function toggleMemberActive(memberId, newActive) {
  const { error } = await sb.from('office_members').update({ active: newActive }).eq('id', memberId);
  if (error) { alert('خطأ: '+error.message); return; }
  loadTeamList();
}

// يحاول يفهم رد الذكاء الاصطناعي كـ JSON حتى لو فيه شوائب (مقدمة نصية، فواصل زيادة، رد متقطوع)
// isArray=true لو المتوقع مصفوفة [] بدل كائن {}
function parseAIJson(rawText, isArray) {
  let text = rawText.replace(/```json|```/g, '').trim();
  const openCh = isArray ? '[' : '{';
  const closeCh = isArray ? ']' : '}';
  const start = text.indexOf(openCh);
  const end = text.lastIndexOf(closeCh);
  if (start !== -1 && end !== -1 && end > start) text = text.slice(start, end + 1);

  try { return JSON.parse(text); } catch(e) { /* نكمل نحاول نصلحه */ }

  try {
    let fixed = text;
    fixed = fixed.replace(/,\s*([}\]])/g, '$1');
    const opens = (fixed.match(/{/g)||[]).length;
    const closes = (fixed.match(/}/g)||[]).length;
    const opensArr = (fixed.match(/\[/g)||[]).length;
    const closesArr = (fixed.match(/\]/g)||[]).length;
    const quoteCount = (fixed.match(/(?<!\\)"/g)||[]).length;
    if (quoteCount % 2 !== 0) fixed += '"';
    for (let i=0; i<opens-closes; i++) fixed += '}';
    for (let i=0; i<opensArr-closesArr; i++) fixed += ']';
    return JSON.parse(fixed);
  } catch(e2) { return null; }
}

- عنوان جذاب واحترافي للمقال
- محتوى المقال (250-350 كلمة) يشرح للقارئ العادي: إيه أهم النقاط القانونية في هذا المجال، إيه الأخطاء الشائعة اللي الناس بتقع فيها، ومتى يحتاجوا يستشيروا محامي

{"title": "العنوان هنا", "content": "المحتوى هنا"}`;

  try {
    let text = await callAI(prompt2, 1200);
    text = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    if (parsed.title && parsed.content) {

}

function exportBackup() {
  const backup = {
    profile: store.profile,
    cases: store.cases,
    archive: JSON.parse(safeGet('qd_archive','[]')),
    site: JSON.parse(safeGet('qd_site','null')),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(backup,null,2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `backup-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm('استيراد النسخة الاحتياطية هيستبدل كل البيانات الحالية. متأكد؟')) { event.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const backup = JSON.parse(reader.result);
      if (backup.profile) store.profile = backup.profile;
      if (backup.cases) store.cases = backup.cases;
      save();
      if (backup.archive) safeSet('qd_archive', JSON.stringify(backup.archive));
      if (backup.site) safeSet('qd_site', JSON.stringify(backup.site));
      alert('تم الاستيراد بنجاح ✅');
      closeModal(); initApp();
    } catch(e) {
      alert('ملف النسخة الاحتياطية غير صالح');
    }
  };
  reader.readAsText(file);
}

    tfoot td{background:#f9f5e8;font-weight:800;border-top:2px solid #c9a84c}
    .print-btn{position:fixed;top:16px;left:16px;background:#c9a84c;color:#000;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;z-index:99}
    .print-btn:hover{background:#e8c97a}
    @media print{.print-btn{display:none}body{padding:14px}}
  </style></head><body>
  <button class="print-btn" onclick="window.print()">🖨️ طباعة / PDF</button>
  ${bodyHTML}
  <div style="margin-top:28px;padding-top:14px;border-top:1px solid #eee;font-size:11px;color:#aaa;text-align:center">
    تم إنشاء هذا التقرير بواسطة نظام إدارة قضايا المستشار — ${new Date().toLocaleDateString('ar-EG')}
  </div>
  </body></html>`);
  w.document.close();
}

// ─── PWA ─────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

// ─── INIT ────────────────────────────────────────────────
try {
  checkOnboard();
  if (storageBlocked) {
    console.warn('localStorage غير متاح — يتم استخدام تخزين مؤقت في الذاكرة فقط لهذه الجلسة.');
  }
} catch (e) {
  document.body.innerHTML = `<div style="padding:40px 24px;text-align:center;font-family:Tahoma,Arial,sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;direction:rtl">
    <div style="font-size:40px;margin-bottom:14px">⚠️</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:10px;color:#c9a84c">حدث خطأ أثناء تحميل التطبيق</div>
    <div style="font-size:13px;color:#888;margin-bottom:16px">${e.message}</div>
    <div style="font-size:12px;color:#666">جرّب رفع الملف على استضافة (مثل Netlify) بدل فتحه مباشرة من الجهاز.</div>
  </div>`;
  console.error(e);
}
</script>
</body>
